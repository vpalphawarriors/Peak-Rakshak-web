<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pik Rakshak</title>

<style>

body{
font-family:Arial;
margin:0;
padding:0;

/* Farmer background image */
background-image:url("https://images.unsplash.com/photo-1592982537447-7440770cbfc9");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

header{
background:rgba(0,100,0,0.9);
color:white;
text-align:center;
padding:20px;
}

.container{
width:800px;
margin:auto;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

img{
width:100%;
margin-top:15px;
border-radius:8px;
}

.result{
background:#e8f5e9;
padding:15px;
margin-top:15px;
border-radius:8px;
}

.map{
margin-top:15px;
}

</style>

</head>

<body>

<header>

<h1>🌱 Pik Rakshak</h1>
<p>AI Crop Disease Detector for Farmers</p>

</header>


<div class="container">

<div class="card" id="login">

<h2>Farmer Login</h2>

<input id="name" placeholder="Farmer Name">

<input id="phone" placeholder="Mobile Number">

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

</div>


<div class="card" id="upload" style="display:none">

<h2>Upload Crop Leaf Image</h2>

<input type="file" id="imageUpload" accept="image/*">

<button onclick="predict()">Detect Disease</button>

<img id="preview">

<div id="result" class="result" style="display:none">

<h3>Disease Result</h3>

<p id="engDisease"></p>
<p id="marDisease"></p>
<p id="solution"></p>
<p id="fertilizer"></p>
<p id="buy"></p>

<div class="map">

<h3>Nearby Fertilizer Shops</h3>

<iframe
width="100%"
height="300"
frameborder="0"
style="border:0"
src="https://www.google.com/maps?q=fertilizer+shop+near+me&output=embed"
allowfullscreen>
</iframe>

</div>

</div>

</div>

</div>


<script>

/* OTP SYSTEM */

let otp;

function sendOTP(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(name==""){
alert("Enter Farmer Name");
return;
}

if(phone.length!=10){
alert("Enter valid 10 digit mobile number");
return;
}

otp=Math.floor(100000+Math.random()*900000);

alert("Demo OTP: "+otp);

}

function verifyOTP(){

let user=document.getElementById("otp").value;

if(user==otp){

alert("Login Successful");

document.getElementById("login").style.display="none";
document.getElementById("upload").style.display="block";

}else{

alert("Wrong OTP");

}

}


/* DISEASE DATABASE */

const diseaseDB=[

{
eng:"Healthy Leaf",
mar:"निरोगी पान",
solution:"Maintain proper irrigation and balanced fertilizer.",
fertilizer:"NPK 19:19:19",
link:"https://www.amazon.in/s?k=npk+19+19+19+fertilizer"
},

{
eng:"Leaf Spot",
mar:"पानांवरील ठिपके रोग",
solution:"Remove infected leaves and spray copper fungicide.",
fertilizer:"Copper Oxychloride",
link:"https://www.amazon.in/s?k=copper+oxychloride"
},

{
eng:"Powdery Mildew",
mar:"भुरी रोग",
solution:"Spray sulfur fungicide.",
fertilizer:"Sulfur Fungicide",
link:"https://www.amazon.in/s?k=sulfur+fungicide"
},

{
eng:"Rust Disease",
mar:"तांबेरा रोग",
solution:"Spray Propiconazole fungicide.",
fertilizer:"Propiconazole",
link:"https://www.amazon.in/s?k=propiconazole+fungicide"
},

{
eng:"Early Blight",
mar:"लवकर करपा रोग",
solution:"Apply Mancozeb fungicide.",
fertilizer:"Mancozeb",
link:"https://www.amazon.in/s?k=mancozeb+fungicide"
}

];


/* DETECTION */

function predict(){

let file=document.getElementById("imageUpload").files[0];

if(!file){

alert("Upload image");

return;

}

document.getElementById("preview").src=URL.createObjectURL(file);

/* Demo detection */

let random=Math.floor(Math.random()*diseaseDB.length);

let data=diseaseDB[random];

document.getElementById("result").style.display="block";

document.getElementById("engDisease").innerText="Disease Name (English): "+data.eng;

document.getElementById("marDisease").innerText="रोगाचे नाव (Marathi): "+data.mar;

document.getElementById("solution").innerText="Solution: "+data.solution;

document.getElementById("fertilizer").innerText="Recommended Fertilizer: "+data.fertilizer;

document.getElementById("buy").innerHTML="Purchase Link: <a href='"+data.link+"' target='_blank'>Buy Here</a>";

}

</script>

</body>
</html>
