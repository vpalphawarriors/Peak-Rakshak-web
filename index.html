<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pik Rakshak</title>

<style>

body{
font-family:Arial;
margin:0;
background:url("https://images.unsplash.com/photo-1464226184884-fa280b87c399");
background-size:cover;
background-attachment:fixed;
overflow-x:hidden;
}

header{
background:linear-gradient(90deg,#2e7d32,#1b5e20);
color:white;
text-align:center;
padding:18px;
font-size:28px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #2e7d32}
to{box-shadow:0 0 30px #66bb6a}
}

.icons{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.icon{
position:absolute;
font-size:28px;
opacity:0.5;
animation:float 12s linear infinite;
}

.icon:nth-child(1){left:10%;animation-delay:0s}
.icon:nth-child(2){left:30%;animation-delay:3s}
.icon:nth-child(3){left:60%;animation-delay:5s}
.icon:nth-child(4){left:80%;animation-delay:7s}

@keyframes float{
0%{transform:translateY(100vh) rotate(0deg)}
100%{transform:translateY(-10vh) rotate(360deg)}
}

.login{
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
animation:bgZoom 20s infinite alternate;
}

@keyframes bgZoom{
from{background-size:100%}
to{background-size:110%}
}

.page{
display:none;
padding:20px;
min-height:100vh;
background:rgba(255,255,255,0.9);
animation:fade 0.8s;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
transition:transform 0.3s;
}

.card:hover{
transform:scale(1.02);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px;
margin-top:10px;
background:linear-gradient(90deg,#43a047,#2e7d32);
color:white;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:linear-gradient(90deg,#66bb6a,#2e7d32);
transform:scale(1.05);
box-shadow:0 0 15px #66bb6a;
}

.result{
background:#f1f8e9;
padding:15px;
margin-top:10px;
border-radius:6px;
animation:fade 0.6s;
}

</style>
</head>

<body>

<header>🌾 Pik Rakshak - Smart Farming Assistant</header>

<div class="icons">
<div class="icon">🌿</div>
<div class="icon">🌾</div>
<div class="icon">🍃</div>
<div class="icon">🚜</div>
</div>

<div id="loginPage" class="login">
<div class="card" style="width:320px">
<h3>Farmer Login</h3>
<input id="name" placeholder="Farmer Name">
<input id="mobile" placeholder="Mobile Number">
<button onclick="login()">Login</button>
</div>
</div>

<div id="menuPage" class="page">
<div class="card">
<h3>Farmer Services</h3>

<button onclick="showPage('detectPage')">🌿 Disease Detection</button>
<button onclick="showPage('soilPage')">🌱 Soil & Crop Recommendation</button>
<button onclick="showPage('shopPage')">📍 Nearby Fertilizer Shop</button>
<button onclick="showPage('weatherPage')">☁ Weather Forecast</button>
<button onclick="showPage('fertilizerPage')">🧪 Fertilizer Recommendation</button>
<button onclick="showPage('profitPage')">📊 Crop Profit Calculator</button>
<button onclick="showPage('tradePage')">🌍 Crop Import Export</button>

</div>
</div>

<div id="detectPage" class="page">
<div class="card">

<h3>Disease Detection</h3>

<select id="plant">
<option>wheat</option>
<option>rice</option>
<option>maize</option>
<option>cotton</option>
<option>tomato</option>
<option>potato</option>
<option>onion</option>
</select>

<input type="file" accept="image/*" capture="environment" id="imageInput">

<button onclick="detect()">Detect Disease</button>

<div id="result" class="result"></div>

<button onclick="showPage('menuPage')">Back</button>

</div>
</div>

<div id="soilPage" class="page">
<div class="card">

<h3>Soil & Crop Suggestion</h3>

<select id="soilType">
<option>Black</option>
<option>Red</option>
<option>Sandy</option>
<option>Clay</option>
</select>

<input id="ph" placeholder="Soil pH">
<input id="temp" placeholder="Temperature °C">

<button onclick="soilRecommend()">Recommend Crop</button>

<div id="soilResult" class="result"></div>

<button onclick="showPage('menuPage')">Back</button>

</div>
</div>

<div id="fertilizerPage" class="page">
<div class="card">

<h3>Fertilizer Recommendation</h3>

<select id="fertCrop">
<option>wheat</option>
<option>rice</option>
<option>cotton</option>
<option>tomato</option>
<option>onion</option>
</select>

<button onclick="showFertilizer()">Recommend Fertilizer</button>

<div id="fertResult" class="result"></div>

<button onclick="showPage('menuPage')">Back</button>

</div>
</div>

<div id="shopPage" class="page">
<div class="card">

<h3>Nearby Fertilizer Shop</h3>

<input id="city" placeholder="Enter City">

<button onclick="searchShop()">Search</button>

<div id="map"></div>

<button onclick="showPage('menuPage')">Back</button>

</div>
</div>

<div id="weatherPage" class="page">
<div class="card">

<h3>Weather Forecast</h3>

<input id="weatherCity" placeholder="Enter City">

<button onclick="weather()">Check Weather</button>

<div id="weatherResult" class="result"></div>

<button onclick="showPage('menuPage')">Back</button>

</div>
</div>

<div id="profitPage" class="page">
<div class="card">

<h3>Crop Profit Calculator</h3>

<input id="cost" placeholder="Total Cost ₹">
<input id="sell" placeholder="Selling Price ₹">

<button onclick="profit()">Calculate Profit</button>

<div id="profitResult" class="result"></div>

<button onclick="showPage('menuPage')">Back</button>

</div>
</div>

<div id="tradePage" class="page">
<div class="card">

<h3>India Crop Import Export Data</h3>

<select id="tradeCrop">
<option>Rice</option>
<option>Wheat</option>
<option>Onion</option>
<option>Potato</option>
<option>Cotton</option>
</select>

<button onclick="showTrade()">Show Trade Data</button>

<div id="tradeResult" class="result"></div>

<button onclick="showPage('menuPage')">Back</button>

</div>
</div>

<script>

function login(){
let name=document.getElementById("name").value
let mobile=document.getElementById("mobile").value
if(name==""||mobile==""){alert("Enter Name and Mobile");return;}
document.getElementById("loginPage").style.display="none"
showPage("menuPage")
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none")
document.getElementById(id).style.display="block"
}

function detect(){
let plant=document.getElementById("plant").value
let img=document.getElementById("imageInput").files[0]

if(!img){
alert("Please upload or capture plant image")
return
}

let diseases={
wheat:"Rust Disease",
rice:"Blast Disease",
maize:"Leaf Blight",
cotton:"Bollworm",
tomato:"Early Blight",
potato:"Late Blight",
onion:"Purple Blotch"
}

document.getElementById("result").innerHTML=
"Plant: "+plant+
"<br>Disease: "+diseases[plant]+
"<br>Solution: Use recommended fungicide and remove infected leaves."
}

function soilRecommend(){

let soil=document.getElementById("soilType").value
let ph=document.getElementById("ph").value
let temp=document.getElementById("temp").value

let crop=""

if(soil=="Black" && ph>=6 && ph<=8 && temp>20){
crop="Cotton, Soybean"
}
else if(soil=="Red"){
crop="Groundnut, Millet"
}
else if(soil=="Sandy"){
crop="Watermelon, Potato"
}
else{
crop="Rice, Wheat"
}

document.getElementById("soilResult").innerHTML="Recommended Crops: "+crop

}

function showFertilizer(){

let crop=document.getElementById("fertCrop").value

let fert={
wheat:{name:"Urea Fertilizer",dose:"45kg per acre",time:"Apply during tillering stage"},
rice:{name:"Urea Fertilizer",dose:"50kg per acre",time:"Apply after transplanting"},
cotton:{name:"NPK 20-20-20 Fertilizer",dose:"40kg per acre",time:"Apply before flowering"},
tomato:{name:"Calcium Nitrate Fertilizer",dose:"25kg per acre",time:"Apply during fruiting"},
onion:{name:"DAP Fertilizer",dose:"35kg per acre",time:"Apply before bulb formation"}
}

let f=fert[crop]

let amazon="https://www.amazon.in/s?k="+encodeURIComponent(f.name)
let flipkart="https://www.flipkart.com/search?q="+encodeURIComponent(f.name)
let indiamart="https://dir.indiamart.com/search.mp?ss="+encodeURIComponent(f.name)

document.getElementById("fertResult").innerHTML=

"Recommended Fertilizer: "+f.name+
"<br>Dose: "+f.dose+
"<br>Usage Time: "+f.time+

"<br><br>Buy Online:<br>"+

"<a target='_blank' href='"+amazon+"'>Buy on Amazon</a><br>"+
"<a target='_blank' href='"+flipkart+"'>Buy on Flipkart</a><br>"+
"<a target='_blank' href='"+indiamart+"'>Buy on IndiaMart</a>"
}

function searchShop(){
let city=document.getElementById("city").value

document.getElementById("map").innerHTML=
'<iframe width="100%" height="350" src="https://maps.google.com/maps?q=fertilizer%20shop%20in%20'+city+'&output=embed"></iframe>'
}

function weather(){
let city=document.getElementById("weatherCity").value

document.getElementById("weatherResult").innerHTML=
"Weather in "+city+"<br>Temperature: 28°C<br>Humidity: 60%<br>Rain Chance: 20%"
}

function profit(){
let cost=document.getElementById("cost").value
let sell=document.getElementById("sell").value
let p=sell-cost
document.getElementById("profitResult").innerHTML="Profit: ₹"+p
}

function showTrade(){

let crop=document.getElementById("tradeCrop").value

let data={
Rice:"India exports rice to UAE, Iran, Saudi Arabia, USA. Imports very low.",
Wheat:"India exports wheat to Bangladesh, Nepal. Imports during shortage years.",
Onion:"India exports onion to Bangladesh, Malaysia, Sri Lanka, UAE.",
Potato:"India exports potato to Nepal, Sri Lanka and Middle East countries.",
Cotton:"India exports cotton to China, Bangladesh, Vietnam."
}

document.getElementById("tradeResult").innerHTML=data[crop]

}

</script>

</body>
</html>
